name: Python CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint & Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linters
        run: pip install "black>=24.0" flake8 bandit safety && pip install -r requirements.txt

      - name: Black format check
        run: black --check --line-length 120 aws/

      - name: Flake8 lint
        run: flake8 aws/ --max-line-length=120 --extend-ignore=E203,W503

      - name: Bandit security scan
        run: bandit -r aws/ -ll -ii

      - name: Safety dependency check
        run: safety check -r requirements.txt
        continue-on-error: true

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@master
        with:
          scandir: "./bash"
          severity: warning
